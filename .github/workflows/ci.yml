name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  agent-smoke:
    name: Agent Smoke Run
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent on clean fixture
        run: |
          python src/main.py --input tests/fixtures/fixture_clean.xlsx --verbose
          echo "--- Output files ---"
          ls -lh data/output/

      - name: Verify output was produced
        run: |
          count=$(ls data/output/PO_Processed_*.xlsx 2>/dev/null | wc -l)
          if [ "$count" -lt 1 ]; then
            echo "ERROR: No output file produced."
            exit 1
          fi
          echo "OK: $count output file(s) found."

      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-smoke-output
          path: data/output/
          retention-days: 7
